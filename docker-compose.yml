services:
  scrutator:
    build: .
    network_mode: host
    env_file: .env
    environment:
      # Dedicated bounded corpus written by the existing feeder credential.
      # Preserve every operator-configured namespace and append only this scope.
      SCRUTATOR_FEEDER_NAMESPACES: "${SCRUTATOR_FEEDER_NAMESPACES:-},self-improvement"
    restart: unless-stopped
    volumes:
      - scrutator-logs:/app/logs
      - type: bind
        source: /var/lib/scrutator/ltm-reflect
        target: /var/lib/scrutator/ltm-reflect
        read_only: false
        bind:
          create_host_path: false
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8310/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  scrutator-logs:
