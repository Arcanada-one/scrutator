name: Deploy

permissions:
  contents: read

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  network-exposure:
    uses: Arcanada-one/datarim/.github/workflows/network-exposure-lint.yml@d3f518ea11f28f94af9c73021fa96fb4ce3f688f # main 2026-07-22
    with:
      compose_paths: docker-compose.yml
      datarim_ref: d3f518ea11f28f94af9c73021fa96fb4ce3f688f
      runner_labels: '["ubuntu-24.04"]'

  verify-exact-target:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out reviewed source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check src/ tests/

      - name: Format check
        run: ruff format --check src/ tests/

      - name: Security scan
        run: bandit -ll -ii -r src/scrutator/search/navigator.py src/scrutator/search/searcher.py src/scrutator/health.py tools/backfill_sections.py

      - name: Test exact target including real Docker deploy semantics
        env:
          PYTHONPATH: src
          SCRUTATOR_REQUIRE_DOCKER_SEMANTIC_TEST: "1"
        run: pytest tests/ -v

  deploy:
    needs: [network-exposure, verify-exact-target]
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on:
      group: scrutator-prod
      labels: [self-hosted, linux, arcana-db, docker]
    environment: kb-production
    concurrency:
      group: deploy-scrutator
      cancel-in-progress: false
    steps:
      - name: Check out deploy transaction
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Pre-deploy host readiness
        id: preflight
        uses: Arcanada-one/datarim/.github/actions/preflight-check@f01ab2034ee99321fe627b76e98641b672e12c0b # v1, immutable pin
        with:
          target-host: arcana-kb
          service-name: scrutator
          extra-checks: |
            tailscale
            time-skew
            docker-pressure
          ops-bot-key: ${{ secrets.OPSBOT_API_KEY }}

      - name: Deploy
        if: steps.preflight.outputs.status != 'fail'
        env:
          SCRUTATOR_REVIEWED_DEPLOY_SURFACE_SHA: ${{ vars.SCRUTATOR_REVIEWED_DEPLOY_SURFACE_SHA }}
        run: |
          deploy/scrutator-deploy-transaction.sh \
            --target-sha "${GITHUB_SHA}"

      - name: Notify Ops Bot on failure
        if: failure()
        env:
          OPSBOT_API_KEY: ${{ secrets.OPSBOT_API_KEY }}
        run: |
          if [ -z "${OPSBOT_API_KEY:-}" ]; then
            echo "OPSBOT_API_KEY unset; skipping optional failure notification"
            exit 0
          fi
          curl -fsS -X POST https://ops.arcanada.ai/events \
            -H "Authorization: Bearer ${OPSBOT_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"category":"fatal","agent":"scrutator","title":"Deploy Failed: ${{ github.repository }}","body":"Branch: ${{ github.ref }}, Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}","dedup_key":"deploy-fail-${{ github.repository }}-${{ github.run_id }}"}'
