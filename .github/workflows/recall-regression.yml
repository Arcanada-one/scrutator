name: Recall@k Regression Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}  # manual observational re-run; baseline refresh requires reviewed change

jobs:
  recall-gate:
    runs-on: [self-hosted, linux, arcana-db, docker]
    # Co-located with Scrutator on arcana-db (reaches :8310 on localhost / 100.70.137.104:8310).
    # NOT ubuntu-latest: (a) Tailscale-only endpoint unreachable from hosted runners;
    # (b) Arcanada org billing-blocked for hosted runners (cicd-convention VERD-0058).

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0 (pinned, matches ci.yml)
        with:
          python-version: "3.12"

      - name: Mint short-lived benchmark reader token
        env:
          KB_OBSERVER_CLIENT_SECRET: ${{ secrets.KB_OBSERVER_CLIENT_SECRET }}
          TOKEN_FILE: ${{ runner.temp }}/scrutator-recall-reader.jwt
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import urllib.parse
          import urllib.request
          from pathlib import Path

          secret = os.environ.get("KB_OBSERVER_CLIENT_SECRET", "")
          if not secret:
              raise SystemExit("KB_OBSERVER_CLIENT_SECRET is not configured")
          credentials = base64.b64encode(f"kb-observer:{secret}".encode()).decode()
          body = urllib.parse.urlencode({
              "grant_type": "client_credentials",
              "scope": "kb:ltm.read",
              "resource": "urn:arcanada:scrutator:ltm",
          }).encode()
          request = urllib.request.Request(
              "https://auth.arcanada.ai/oidc/token",
              data=body,
              headers={
                  "Authorization": f"Basic {credentials}",
                  "Content-Type": "application/x-www-form-urlencoded",
                  "User-Agent": "Arcanada-Scrutator-Recall-Gate/1.0",
              },
          )
          with urllib.request.urlopen(request, timeout=15) as response:
              token = json.load(response).get("access_token", "")
          if not token:
              raise SystemExit("token endpoint returned no access_token")
          token_path = Path(os.environ["TOKEN_FILE"])
          token_path.write_text(token)
          token_path.chmod(0o600)
          PY

      - name: Run recall@k regression gate
        run: |
          # Gate mode: with-entities (--expand-entities).
          # Rationale: production /v1/ltm/recall defaults to expand_entities=true; the gate
          # must defend the production retrieval path.  Baseline (baseline.json) was seeded
          # from the 2026-04-26 with-entities run; --run must produce the same mode so
          # observed and baseline are always comparable (no mode-mismatch born-red gate).
          python benchmark/recall-gate/recall_gate.py --run \
            --harness "$HARNESS_PATH" \
            --baseline benchmark/recall-gate/baseline.json \
            --thresholds benchmark/recall-gate/thresholds.json
        env:
          # INFRA-0322 renamed the host and the runner no longer carries the
          # historical ~/arcanada follower path. Use the reviewed vendored
          # harness/query snapshot so the regression gate is checkout-local.
          HARNESS_PATH: benchmark/recall-gate/vendor/ltm-bench-query.py
          SCRUTATOR_BEARER_TOKEN_FILE: ${{ runner.temp }}/scrutator-recall-reader.jwt
          # Deliberately not guessed from repository config. Until the effective production
          # route is supplied by a trusted deployment source, the report says "unreported"
          # and exits 3 (invalid benchmark) rather than making a false regression claim.
          LTM_BENCH_RERANKER_MODEL: ${{ vars.SCRUTATOR_LTM_RERANKER_MODEL }}

      - name: Remove benchmark reader token
        if: always()
        run: rm -f "${{ runner.temp }}/scrutator-recall-reader.jwt"
