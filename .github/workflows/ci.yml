name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check src/ tests/

      - name: Format check
        run: ruff format --check src/ tests/

      - name: Test
        run: pytest tests/ -v
        env:
          PYTHONPATH: src

  deploy:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: [self-hosted, linux, arcana-db, docker]
    concurrency:
      group: deploy-scrutator
      cancel-in-progress: false
    steps:
      - name: Deploy
        run: |
          set -e
          cd /srv/apps/scrutator
          git pull --ff-only origin main
          docker compose up -d --build
          sleep 10
          curl -fsS http://localhost:${{ vars.SERVICE_PORT }}/health

      - name: Notify Ops Bot on failure
        if: failure()
        run: |
          curl -fsS -X POST https://ops.arcanada.one/events \
            -H "Authorization: Bearer ${{ secrets.OPSBOT_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"category":"fatal","title":"CI Deploy Failed: ${{ github.repository }}","body":"Branch: ${{ github.ref }}, Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}","dedup_key":"ci-fail-${{ github.repository }}-${{ github.run_id }}"}'
