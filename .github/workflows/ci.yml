name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secrets-gate:
    # TRANS-0029: OPSBOT_API_KEY is NOT currently set for this repo (highest-
    # priority gap in the 2026-04-28 ecosystem audit — confirmed still true).
    # This job is authored to match the TRANS-0027 (transcribator-api) hard-fail
    # pattern, but deliberately NOT wired into `deploy`'s `needs:` yet: doing so
    # today would hard-block every future deploy on push to main until the
    # secret exists. Provisioning `gh secret set OPSBOT_API_KEY --repo
    # Arcanada-one/scrutator` (`agent register --name scrutator` first) is a
    # credential-provisioning action outside this sweep's reversible scope —
    # once the operator sets it, wire this gate into the separately reviewed
    # deploy workflow to close this gap.
    if: false
    runs-on: ubuntu-24.04
    steps:
      - name: Assert OPSBOT_API_KEY is set
        env:
          OPSBOT_API_KEY: ${{ secrets.OPSBOT_API_KEY }}
        run: |
          if [ -z "${OPSBOT_API_KEY:-}" ]; then
            echo "::error::OPSBOT_API_KEY secret is missing or empty — alerting path to ops.arcanada.one would silently fail. Restore via OpsBot CLI (\`agent register --name scrutator\`) and \`gh secret set OPSBOT_API_KEY --repo Arcanada-one/scrutator\`."
            exit 1
          fi
          echo "OPSBOT_API_KEY present (length=${#OPSBOT_API_KEY})."

  network-exposure:
    # Mandatory per documentation/mandates/cicd-convention.md § 5. This repo's harness code
    # (SRCH-0015) makes outbound-only calls (no new listener) — wired anyway per repo-wide
    # convention, not because this PR introduces a compose/redis/postgres/systemd change.
    uses: Arcanada-one/datarim/.github/workflows/network-exposure-lint.yml@d3f518ea11f28f94af9c73021fa96fb4ce3f688f # main 2026-07-22
    with:
      compose_paths: docker-compose.yml
      datarim_ref: d3f518ea11f28f94af9c73021fa96fb4ce3f688f
      runner_labels: '["ubuntu-24.04"]'

  lint-and-test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check src/ tests/

      - name: Format check
        run: ruff format --check src/ tests/

      - name: Security scan (SRCH-0021 navigation/backfill surface)
        run: bandit -ll -ii -r src/scrutator/search/navigator.py src/scrutator/search/searcher.py src/scrutator/health.py tools/backfill_sections.py

      - name: Test
        run: pytest tests/ -v
        env:
          PYTHONPATH: src
          # The production transaction test may skip only on developer hosts.
          # Hosted PR CI has Docker and must execute the semantic image proof.
          SCRUTATOR_REQUIRE_DOCKER_SEMANTIC_TEST: "1"
